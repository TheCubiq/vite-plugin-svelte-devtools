name: Build dist branch

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prepare release files
        run: |
          cp README.md LICENSE dist/
          cp src/plugin/index.d.ts dist/plugin/index.d.ts
          node -e "const fs=require('fs'); const pkg=require('./package.json'); delete pkg.devDependencies; delete pkg.scripts; pkg.main='./plugin/index.cjs'; pkg.module='./plugin/index.js'; pkg.types='./plugin/index.d.ts'; pkg.exports['.']={types:pkg.types,import:pkg.module,require:pkg.main}; pkg.files=['**/*']; fs.writeFileSync('dist/package.json', JSON.stringify(pkg,null,2)+'\\n')"
      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          commit_message: "build: update dist assets [skip ci]"
