name: Build dist branch

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack release
        run: |
          mkdir .release
          npm pack --pack-destination .release
          mkdir release
          tar -xzf .release/*.tgz -C release --strip-components=1
      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release
          publish_branch: dist
          commit_message: "build: update dist assets [skip ci]"
